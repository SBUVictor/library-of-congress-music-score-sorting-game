name: Add touch fallback for final sorting

on:
  push:
    paths:
      - '.github/workflows/add-touch-final-sort.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-touch-sort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add tap-to-place final sort support
        run: |
          python - <<'PY'
