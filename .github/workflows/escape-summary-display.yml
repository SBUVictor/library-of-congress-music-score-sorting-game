# trigger: 2026-05-13T08:20-04:00
name: Escape summary display fields

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/escape-summary-display.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch completion summary escaping
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');

          if (!html.includes('function escapeHtml(value)')) {
            const marker = '    function renderDone() {\n';
            const helper = `    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

`;
            if (!html.includes(marker)) throw new Error('renderDone marker not found');
            html = html.replace(marker, helper + marker);
          }

          const beforeSummary = '      const maxScore = QUESTIONS_PER_MODULE * modules.length + 1;\n\n      screen.innerHTML = `';
          const afterSummary = [
            '      const maxScore = QUESTIONS_PER_MODULE * modules.length + 1;',
            '      const display = {',
            '        preferredName: escapeHtml(payload.preferredName),',
            '        realName: escapeHtml(payload.realName),',
            '        sbuEmail: escapeHtml(payload.sbuEmail)',
            '      };',
            '',
            '      screen.innerHTML = `'
          ].join('\n');

          if (html.includes(beforeSummary)) {
            html = html.replace(beforeSummary, afterSummary);
          } else if (!html.includes('preferredName: escapeHtml(payload.preferredName)')) {
            throw new Error('summary insertion point not found');
          }

          html = html
            .replaceAll('${payload.preferredName}', '${display.preferredName}')
            .replaceAll('${payload.realName}', '${display.realName}')
            .replaceAll('${payload.sbuEmail}', '${display.sbuEmail}');

          fs.writeFileSync(path, html);
          NODE

          rm .github/workflows/escape-summary-display.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/escape-summary-display.yml
          git commit -m "Escape summary display fields"
          git push
