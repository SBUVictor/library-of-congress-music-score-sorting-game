name: Add lesson screens

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-lessons.yml

permissions:
  contents: write

jobs:
  add-lessons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add lesson screens to game
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');
          const original = html;

          function replaceOnce(from, to) {
            if (!html.includes(from)) throw new Error('Expected text not found: ' + from.slice(0, 100));
            html = html.replace(from, to);
          }

          function replaceTeach(key, teachLines) {
            const teach = teachLines.join('\n');
            const re = new RegExp('(key: "' + key + '",[\\s\\S]*?teach: `)[\\s\\S]*?(`,\\n        check:)');
            if (!re.test(html)) throw new Error('Teach block not found for ' + key);
            html = html.replace(re, '$1' + teach + '$2');
          }

          const lessonStyles = [
            '    .worked-box {',
            '      background: #ffffff;',
            '    }',
            '',
            '    .lesson-lead {',
            '      font-size: 1.02rem;',
            '      margin-top: 0;',
            '    }',
            '',
            '    .demo-grid {',
            '      display: grid;',
            '      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));',
            '      gap: 12px;',
            '      margin: 14px 0;',
            '    }',
            '',
            '    .demo-card {',
            '      background: #ffffff;',
            '      border: 1px solid var(--line);',
            '      border-radius: 12px;',
            '      padding: 12px;',
            '    }',
            '',
            '    .call-stack {',
            '      display: grid;',
            '      gap: 4px;',
            '      margin: 8px 0;',
            '      font-family: Consolas, monospace;',
            '      font-size: .95rem;',
            '    }',
            '',
            '    .call-stack span {',
            '      display: inline-block;',
            '      width: fit-content;',
            '      background: var(--warn-bg);',
            '      border: 1px solid #e7dda0;',
            '      border-radius: 8px;',
            '      padding: 3px 8px;',
            '    }',
            '',
            '    .demo-note {',
            '      border-left: 4px solid var(--accent);',
            '      padding-left: 10px;',
            '      margin: 12px 0 0;',
            '    }',
            '',
            '    .section-label {'
          ].join('\n');
          replaceOnce('    .worked-box {\n      background: #ffffff;\n    }\n\n    .section-label {', lessonStyles);

          replaceTeach('module1', [
            '          <div class="section-label">Lesson</div>',
            '          <p class="lesson-lead">Music score call numbers are read slowly from top to bottom. In these practice labels, the first line is <code class="call">M</code>, which tells you this is a regular music score, and the next thing to compare is the class number. Do not jump ahead to the Cutter, year, volume, or copy number until the class number is settled. The smaller class number shelves first, including when one number has a decimal.</p>',
            '          <div class="demo-grid">',
            '            <div class="demo-card">',
            '              <div class="section-label">Label A</div>',
            '              <div class="call-stack">',
            '                <span>M</span>',
            '                <span>451</span>',
            '                <span>.S3</span>',
            '                <span>H4 Bd.1 v.1 c.3</span>',
            '              </div>',
            '            </div>',
            '            <div class="demo-card">',
            '              <div class="section-label">Label B</div>',
            '              <div class="call-stack">',
            '                <span>M</span>',
            '                <span>412</span>',
            '                <span>.S415</span>',
            '                <span>D.487 1970z</span>',
            '              </div>',
            '            </div>',
            '          </div>',
            '          <p class="demo-note">Both labels begin with <code class="call">M</code>, so compare the class number next. <strong>412 comes before 451</strong>, so Label B shelves first. The later lines do not matter yet.</p>'
          ]);

          replaceTeach('module2', [
            '          <div class="section-label">Lesson</div>',
            '          <p class="lesson-lead">If two music scores have the same first line and the same class number, keep reading down to the next line. That line is often the first Cutter: a dot, then a letter, then numbers. Compare the letter first, then compare the number like a decimal. This is why <code class="call">.B3</code> comes before <code class="call">.B34</code>, and why <code class="call">.B99</code> still comes before <code class="call">.C1</code>.</p>',
            '          <div class="demo-grid">',
            '            <div class="demo-card">',
            '              <div class="section-label">Label A</div>',
            '              <div class="call-stack">',
            '                <span>M</span>',
            '                <span>412</span>',
            '                <span>.S15</span>',
            '                <span>Emaj. 1992</span>',
            '              </div>',
            '            </div>',
            '            <div class="demo-card">',
            '              <div class="section-label">Label B</div>',
            '              <div class="call-stack">',
            '                <span>M</span>',
            '                <span>412</span>',
            '                <span>.S415</span>',
            '                <span>D.487 1970z</span>',
            '              </div>',
            '            </div>',
            '          </div>',
            '          <p class="demo-note">The <code class="call">M</code> line and class number match, so the Cutter decides this one. <strong>.S15 comes before .S415</strong>. Do not use <code class="call">Emaj.</code>, <code class="call">D.487</code>, or the year until the Cutter line is settled.</p>'
          ]);

          replaceOnce('title: "Then Use Years, Volumes, Parts, and Other Details",', 'title: "Line 4 and Later Details",');
          replaceTeach('module3', [
            '          <div class="section-label">Lesson</div>',
            '          <p class="lesson-lead">Line 4 is where many music score labels start to feel busy. After <code class="call">M</code>, the class number, and the first Cutter match, the next line may be a year, another Cutter, a volume, a part, a number, a copy, or another local detail. The rule is still calm and simple: compare the first different line, use that difference to decide order, and keep later details out of the decision until you need them.</p>',
            '          <div class="demo-grid">',
            '            <div class="demo-card">',
            '              <div class="section-label">Label A</div>',
            '              <div class="call-stack">',
            '                <span>M</span>',
            '                <span>451</span>',
            '                <span>.S3 H4</span>',
            '                <span>Bd.1 v.1 c.3</span>',
            '              </div>',
            '            </div>',
            '            <div class="demo-card">',
            '              <div class="section-label">Label B</div>',
            '              <div class="call-stack">',
            '                <span>M</span>',
            '                <span>451</span>',
            '                <span>.S3 H4</span>',
            '                <span>Bd.2 v.1 c.2</span>',
            '              </div>',
            '            </div>',
            '          </div>',
            '          <p class="demo-note">The earlier lines match, so line 4 decides it. <strong>Bd.1 comes before Bd.2</strong>. The copy number does not get to decide before the volume or part line that comes earlier.</p>'
          ]);

          const oldFinal = [
            '        <h2>Final Activity</h2>',
            '        <p>Drag each label into the correct order from first to last.</p>',
            '        <p class="muted">Use the same comparison logic you practiced: main number first, then the next element, then later details if needed.</p>'
          ].join('\n');
          const newFinal = [
            '        <h2>Final Activity</h2>',
            '        <div class="lesson-box">',
            '          <div class="section-label">Final Review</div>',
            '          <p class="lesson-lead">Before you drag, use the same careful reading process from the lessons. Read each label as if it were stacked vertically: <code class="call">M</code> first, then the class number, then the Cutter, then line 4 or any later details. Stop at the first difference; that is the line that decides shelf order. Accuracy matters more than speed.</p>',
            '          <p class="demo-note">Demonstration: if two labels both start <code class="call">M 1001 .B34</code>, then a fourth line of <code class="call">1998</code> shelves before <code class="call">2023</code>. If the class numbers differ earlier, use the class numbers instead and ignore the later lines.</p>',
            '        </div>',
            '        <p>Drag each label into the correct order from first to last.</p>',
            '        <p class="muted">Use the same comparison logic you practiced: main number first, then the next element, then line 4 and later details if needed.</p>'
          ].join('\n');
          replaceOnce(oldFinal, newFinal);

          if (html === original) throw new Error('No changes were made');
          fs.writeFileSync(path, html);
          NODE
      - name: Commit lesson update
        run: |
          rm -f .github/workflows/add-lessons.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-lessons.yml
          git commit -m "Add teaching lessons before tests"
          git push
