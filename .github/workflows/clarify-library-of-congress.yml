name: Clarify Library of Congress call numbers

on:
  push:
    paths:
      - '.github/workflows/clarify-library-of-congress.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update learner-facing copy
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '<div class="version">Version 10.0</div>': '<div class="version">Version 10.1 - Library of Congress</div>',
              'Shelf It Right drops you into the logic of real music library call numbers, where every decimal, letter, and cutter matters. Learn how librarians compare and organize scores using authentic-looking call numbers before stepping into challenge rounds, quiz battles, and the final drag-and-drop showdown.': 'Shelf It Right uses Library of Congress Classification call numbers for music scores, not Dewey Decimal numbers. It drops you into the logic of real music library call numbers, where every decimal, letter, and Cutter matters. Learn how librarians compare and organize scores using authentic-looking Library of Congress call numbers before stepping into challenge rounds, quiz battles, and the final drag-and-drop showdown.',
              'Music score call numbers are read slowly from top to bottom. In these practice labels, the first line is <code class="call">M</code>, which tells you this is a regular music score, and the next thing to compare is the class number. Do not jump ahead to the Cutter, year, volume, or copy number until the class number is settled. The smaller class number shelves first, including when one number has a decimal.': 'These are Library of Congress Classification call numbers for music scores, not Dewey Decimal numbers. Music score call numbers are read slowly from top to bottom. In these practice labels, the first line is <code class="call">M</code>, which tells you this is a regular music score, and the next thing to compare is the class number. Do not jump ahead to the Cutter, year, volume, or copy number until the class number is settled. The smaller class number shelves first, including when one number has a decimal.',
              'Before you drag, use the same careful reading process from the lessons. Read each label as if it were stacked vertically: <code class="call">M</code> first, then the class number, then the Cutter, then line 4 or any later details. Stop at the first difference; that is the line that decides shelf order. Accuracy matters more than speed.': 'Before you drag, remember that this game is using Library of Congress music call-number order, not Dewey Decimal order. Read each label as if it were stacked vertically: <code class="call">M</code> first, then the class number, then the Cutter, then line 4 or any later details. Stop at the first difference; that is the line that decides shelf order. Accuracy matters more than speed.'
          }
          changed = False
          for old, new in replacements.items():
              if new in text:
                  continue
              if old not in text:
                  raise SystemExit(f'Missing expected text: {old[:120]}')
              text = text.replace(old, new, 1)
              changed = True
          if not changed:
              raise SystemExit('Copy already updated')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/clarify-library-of-congress.yml
      - name: Commit copy update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/clarify-library-of-congress.yml
          git commit -m "Clarify Library of Congress call numbers"
          git push
