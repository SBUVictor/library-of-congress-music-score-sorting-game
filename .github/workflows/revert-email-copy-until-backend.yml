name: Revert premature email copy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/revert-email-copy-until-backend.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  revert-email-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Remove email promise until Apps Script is deployed
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('''
                  <p>Your submitted result will be recorded and emailed to your Stony Brook address.</p>
                  <button id="submitBtn" onclick="submitResults()">Submit Results</button>''', '''
                  <button id="submitBtn" onclick="submitResults()">Submit Results</button>''')
          text = text.replace(
              'Submission sent. Your result will be recorded and emailed to your Stony Brook address.',
              'Submission sent. Check the sheet in a few seconds.'
          )
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/revert-email-copy-until-backend.yml

      - name: Commit applied changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git add index.html .github/workflows/revert-email-copy-until-backend.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Remove email copy until backend is deployed"
          git push
