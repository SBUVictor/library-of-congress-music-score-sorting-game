          +
          +    function randomMainValue() {
          +      const whole = randInt(300, 650);
          +      if (Math.random() < 0.22) {
          +        const tenths = randInt(1, 9);
          +        return { value: whole + tenths / 10, text: `${whole}.${tenths}` };
