          +
          +    function makeDistinctMainValues(count) {
          +      const mains = [];
          +      const seen = new Set();
          +      while (mains.length < count) {
          +        const main = randomMainValue();
          +        if (!seen.has(main.text)) {
          +          seen.add(main.text);
