name: Apply music sorting randomizer

on:
  push:
    paths:
      - ".github/workflows/apply-music-randomizer.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply tested randomizer patch
