name: Apply Stony Brook palette

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-stony-brook-palette.yml

permissions:
  contents: write

jobs:
  apply-palette:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply palette to index.html
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');
          function replaceOnce(from, to) {
            if (!html.includes(from)) throw new Error('Expected text not found: ' + from.slice(0, 80));
            html = html.replace(from, to);
          }
          const replacements = [
            ['--bg: #f4f7fb;', '--bg: #f6f6f6;'],
            ['--ink: #1f2937;', '--ink: #000000;'],
            ['--muted: #6b7280;', '--muted: #4B4B4B;'],
            ['--line: #d7dee8;', '--line: #BEBEBE;'],
            ['--accent: #1d5f91;', '--accent: #990000;'],
            ['--accent-2: #2d74ac;', '--accent-2: #6B000D;\n      --accent-soft: #f5e6e6;'],
            ['--good: #166534;', '--good: #104247;'],
            ['--good-bg: #dcfce7;', '--good-bg: #BCCF9D;'],
            ['--bad: #991b1b;', '--bad: #6B000D;'],
            ['--bad-bg: #fee2e2;', '--bad-bg: #f5d7d9;'],
            ['--warn: #92400e;', '--warn: #002244;'],
            ['--warn-bg: #fef3c7;', '--warn-bg: #F8F2C5;'],
            ['box-shadow: 0 6px 20px rgba(0,0,0,.05);', 'box-shadow: 0 6px 20px rgba(0,0,0,.08);'],
            ['background: #e7eef6;\n      color: #34516c;', 'background: var(--accent);\n      color: #ffffff;'],
            ['background: #e5e7eb;', 'background: #e7e7e7;'],
            ['background: #f8fafc;', 'background: #f7f7f7;'],
            ['background: #f3f4f6;\n      padding: 4px 8px;', 'background: var(--warn-bg);\n      border: 1px solid #e7dda0;\n      padding: 4px 8px;'],
            ['background: #f8fbff;', 'background: var(--accent-soft);'],
            ['background: #fafafa;', 'background: #f7f7f7;'],
            ['box-shadow: 0 2px 8px rgba(0,0,0,.05);', 'box-shadow: 0 2px 8px rgba(0,0,0,.08);'],
            ['border: 2px dashed #cbd5e1;', 'border: 2px dashed var(--line);'],
            ['background: #eef4ff;', 'background: var(--warn-bg);']
          ];
          replacements.forEach(([from, to]) => replaceOnce(from, to));
          replaceOnce('    .pill {', '    .field input:focus {\n      outline: 3px solid var(--accent-soft);\n      border-color: var(--accent);\n    }\n\n    .pill {');
          replaceOnce('    button:disabled {', '    button.secondary:hover {\n      background: var(--warn-bg);\n      border-color: var(--accent);\n      color: var(--ink);\n    }\n\n    button:disabled {');
          fs.writeFileSync(path, html);
          NODE
      - name: Commit palette update
        run: |
          rm -f .github/workflows/apply-stony-brook-palette.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/apply-stony-brook-palette.yml
          git commit -m "Apply Stony Brook palette"
          git push
