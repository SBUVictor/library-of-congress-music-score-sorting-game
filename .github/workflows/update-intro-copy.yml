name: Update intro copy

on:
  push:
    paths:
      - '.github/workflows/update-intro-copy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-intro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update landing copy
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_version = 'Version 10.0 - Real Labels / Teach First / No Module X'
          new_version = 'Version 10.0'
          old_intro = '<p>This version teaches comparison logic directly with real-looking music library call numbers before moving into quiz questions and the final drag activity.</p>'
          new_intro = '''<div id="introText">
        <p>Welcome to Shelf It Right</p>
        <p>Think you can outsmart the shelves? 📚🎼</p>
        <p>Shelf It Right drops you into the logic of real music library call numbers, where every decimal, letter, and cutter matters. Learn how librarians compare and organize scores using authentic-looking call numbers before stepping into challenge rounds, quiz battles, and the final drag-and-drop showdown.</p>
        <p>Train your brain. Trust the logic. Beat the stack.</p>
        <p>Enter your email to receive your final score and see how well you performed under pressure.</p>
      </div>'''

          changed = False
          if old_version in text:
              text = text.replace(old_version, new_version, 1)
              changed = True
          if old_intro in text:
              text = text.replace(old_intro, new_intro, 1)
              changed = True

          if not changed:
              raise SystemExit('Requested intro text was already updated or the expected source text was not found.')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/update-intro-copy.yml
      - name: Commit intro copy update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-intro-copy.yml
          git commit -m "Update intro copy"
          git push
