name: Update Apps Script endpoint

on:
  push:
    paths:
      - '.github/workflows/update-app-script-url.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-endpoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Point game at new Apps Script deployment
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          old = 'https://script.google.com/macros/s/AKfycbwUoY2_eFLWVWyw5JX7Vv15ZdbDYYkYceQ_fpn0sZPGb3gpCtsrPfe3i_iItmv3ZFdiPA/exec'
          new = 'https://script.google.com/macros/s/AKfycbzstvzMlsYEoOWhi1B-aLLdBiwpkeacCGWzaz05BmFdttRNfAE2gd6YwEP9HLCqHgS-/exec'
          text = path.read_text(encoding='utf-8')
          if new in text:
              raise SystemExit('Endpoint already updated')
          if old not in text:
              raise SystemExit('Old endpoint not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/update-app-script-url.yml
      - name: Commit endpoint update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-app-script-url.yml
          git commit -m "Point game to new Apps Script endpoint"
          git push
