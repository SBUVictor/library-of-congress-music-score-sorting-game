name: Fix Code.gs and favicon

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-code-gs-and-favicon.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-code-gs-and-favicon:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish root Code.gs and favicon declaration
        shell: bash
        run: |
          set -euo pipefail
          cp apps-script/Code.gs Code.gs
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          if '<link rel="icon" href="data:," />' not in text:
              text = text.replace('  <title>Shelf It Right</title>\n', '  <title>Shelf It Right</title>\n  <link rel="icon" href="data:," />\n', 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/fix-code-gs-and-favicon.yml

      - name: Commit applied changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git add Code.gs index.html .github/workflows/fix-code-gs-and-favicon.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Publish Apps Script code and quiet favicon 404"
          git push
