<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelf It Right</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #f6f6f6;
      --card: #ffffff;
      --ink: #000000;
      --muted: #4B4B4B;
      --line: #BEBEBE;
      --accent: #990000;
      --accent-2: #6B000D;
      --accent-soft: #f5e6e6;
      --good: #104247;
      --good-bg: #BCCF9D;
      --bad: #6B000D;
      --bad-bg: #f5d7d9;
      --warn: #002244;
      --warn-bg: #F8F2C5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
    }

    h1, h2, h3 { margin-top: 0; }
    h1 { font-size: 2.2rem; margin-bottom: 10px; }
    h2 { font-size: 1.5rem; margin-bottom: 10px; }

    .version {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      margin: 16px 0;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
    }

    .field input:focus {
      outline: 3px solid var(--accent-soft);
      border-color: var(--accent);
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
      margin-bottom: 10px;
    }

    .progress {
      width: 100%;
      height: 10px;
      background: #e7e7e7;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 18px;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .2s ease;
    }

    .lesson-box, .worked-box, .check-box {
      background: #f7f7f7;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin: 14px 0;
    }

    .worked-box {
      background: #ffffff;
    }

    .lesson-lead {
      font-size: 1.02rem;
      margin-top: 0;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 14px 0;
    }

    .demo-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .call-stack {
      display: grid;
      gap: 4px;
      margin: 8px 0;
      font-family: Consolas, monospace;
      font-size: .95rem;
    }

    .call-stack span {
      display: inline-block;
      width: fit-content;
      background: var(--warn-bg);
      border: 1px solid #e7dda0;
      border-radius: 8px;
      padding: 3px 8px;
    }

    .demo-note {
      border-left: 4px solid var(--accent);
      padding-left: 10px;
      margin: 12px 0 0;
    }

    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    code.call {
      display: inline-block;
      background: var(--warn-bg);
      border: 1px solid #e7dda0;
      padding: 4px 8px;
      border-radius: 8px;
      margin: 3px 4px 3px 0;
      font-family: Consolas, monospace;
      font-size: .95rem;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button:hover { background: var(--accent-2); }

    button.choice {
      display: block;
      width: 100%;
      text-align: left;
      margin: 10px 0;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    button.choice:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button.secondary:hover {
      background: var(--warn-bg);
      border-color: var(--accent);
      color: var(--ink);
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .feedback {
      padding: 12px 14px;
      border-radius: 12px;
      margin-top: 12px;
      font-weight: 600;
    }

    .good { background: var(--good-bg); color: var(--good); }
    .bad  { background: var(--bad-bg); color: var(--bad); }
    .warn { background: var(--warn-bg); color: var(--warn); }

    .hidden { display: none; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .summary-box .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .summary-box .value {
      font-size: 1.1rem;
      font-weight: 700;
      word-break: break-word;
    }

    .sortbank, .sortslots {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      min-height: 76px;
      padding: 14px;
      border: 2px dashed var(--line);
      border-radius: 16px;
      background: #f7f7f7;
      margin-bottom: 12px;
    }

    .draggable {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      cursor: grab;
      min-width: 230px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      font-family: Consolas, monospace;
      font-size: .95rem;
    }

    .slot {
      min-height: 68px;
      min-width: 230px;
      border: 2px dashed var(--line);
      border-radius: 12px;
      padding: 8px;
      background: #fff;
    }

    .slotlabel {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .drag-over {
      background: var(--warn-bg);
      border-color: var(--accent);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .wrap { padding: 14px; }
      .card { padding: 18px; }
      h1 { font-size: 1.9rem; }
      .draggable, .slot { min-width: 170px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="version">Version 10.0 - Real Labels / Teach First / No Module X</div>
      <h1>Shelf It Right</h1>
      <p>This version teaches comparison logic directly with real-looking music library call numbers before moving into quiz questions and the final drag activity.</p>

      <div class="form-grid">
        <div class="field">
          <label for="realName">Real Name</label>
          <input id="realName" type="text" placeholder="Enter full name" />
        </div>
        <div class="field">
          <label for="preferredName">Preferred Name</label>
          <input id="preferredName" type="text" placeholder="Enter preferred name" />
        </div>
        <div class="field">
          <label for="sbuEmail">SBU Email</label>
          <input id="sbuEmail" type="email" placeholder="name@stonybrook.edu" />
        </div>
      </div>

      <div id="intakeFeedback"></div>
      <button id="startBtn" type="button">Start Training</button>
    </div>

    <div id="app" class="hidden">
      <div class="card">
        <div id="stageLabel" class="pill">Module 1</div>
        <div class="progress"><div id="bar"></div></div>
        <div id="screen"></div>
      </div>
    </div>
  </div>

  <script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUoY2_eFLWVWyw5JX7Vv15ZdbDYYkYceQ_fpn0sZPGb3gpCtsrPfe3i_iItmv3ZFdiPA/exec";

    const realNameInput = document.getElementById("realName");
    const preferredNameInput = document.getElementById("preferredName");
    const emailInput = document.getElementById("sbuEmail");
    const intakeFeedback = document.getElementById("intakeFeedback");
    const app = document.getElementById("app");
    const screen = document.getElementById("screen");
    const stageLabel = document.getElementById("stageLabel");
    const bar = document.getElementById("bar");
    const QUESTIONS_PER_MODULE = 20;
    const MODULE_PASSING_SCORE = 14;
    const FINAL_DRAG_COUNT = 5;

    const modules = [
      {
        key: "module1",
        label: "Module 1",
        title: "Main Number Comes First",
        teach: `          <div class="section-label">Lesson</div>
          <p class="lesson-lead">Music score call numbers are read slowly from top to bottom. In these practice labels, the first line is <code class="call">M</code>, which tells you this is a regular music score, and the next thing to compare is the class number. Do not jump ahead to the Cutter, year, volume, or copy number until the class number is settled. The smaller class number shelves first, including when one number has a decimal.</p>
          <div class="demo-grid">
            <div class="demo-card">
              <div class="section-label">Label A</div>
              <div class="call-stack">
                <span>M</span>
                <span>451</span>
                <span>.S3</span>
                <span>H4 Bd.1 v.1 c.3</span>
              </div>
            </div>
            <div class="demo-card">
              <div class="section-label">Label B</div>
              <div class="call-stack">
                <span>M</span>
                <span>412</span>
                <span>.S415</span>
                <span>D.487 1970z</span>
              </div>
            </div>
          </div>
          <p class="demo-note">Both labels begin with <code class="call">M</code>, so compare the class number next. <strong>412 comes before 451</strong>, so Label B shelves first. The later lines do not matter yet.</p>`,
        check: {
          prompt: "Which comes first?",
          choices: [
            "M 451 .S3 H4 Bd.1 v.1 c.3",
            "M 412 .S415 D.487 1970z"
          ],
          answer: 1,
          explain: "412 comes before 451, so the second label comes first."
        },
        worked: `
          <div class="section-label">Worked Example</div>
          <p><code class="call">M 412.4 .H4 H.XIV:7</code></p>
          <p><code class="call">M 552 .M8 K.515 1956</code></p>
          <p>Compare the main number first: <strong>412.4 comes before 552</strong>. So the first label comes first.</p>
        `,
        questions: [
          ["Which comes first?", "M 451 .S3 H4 Bd.1 v.1 c.3", "M 412 .S15 Emaj. 1992", 1, "412 comes before 451."],
          ["Which comes first?", "M 552 .M8 K.515 1956", "M 451 .S3 H4 Bd.2 v.1 c.2", 1, "451 comes before 552."],
          ["Which comes first?", "M 412.4 .H4 H.XIV:7", "M 412 .S415 D.487 1970z", 1, "412 comes before 412.4."],
          ["Which comes first?", "M 452 .J63 no. 8 1991", "M 322 .R54 op. 2 v.1", 1, "322 comes before 452."],
          ["Which comes first?", "M 412 .S15 Emaj. 1992", "M 552 .M8 K.515 1956", 0, "412 comes before 552."],
          ["Which comes first?", "M 451 .S3 H4 Bd.2 v.1 c.2", "M 452 .J63 no. 8 1991", 0, "451 comes before 452."],
          ["Which comes first?", "M 412 .S415 D.487 1970z", "M 412.4 .H4 H.XIV:7", 0, "412 comes before 412.4."],
          ["Which comes first?", "M 322 .R54 op. 2 v.1", "M 412 .S15 Emaj. 1992", 0, "322 comes before 412."],
          ["Which comes first?", "M 552 .M8 K.515 1956", "M 412.4 .H4 H.XIV:7", 1, "412.4 comes before 552."],
          ["Which comes first?", "M 452 .J63 no. 8 1991", "M 451 .S3 H4 Bd.1 v.1 c.3", 1, "451 comes before 452."]
        ]
      },
      {
        key: "module2",
        label: "Module 2",
        title: "Then Compare the Next Element",
        teach: `          <div class="section-label">Lesson</div>
          <p class="lesson-lead">If two music scores have the same first line and the same class number, keep reading down to the next line. That line is often the first Cutter: a dot, then a letter, then numbers. Compare the letter first, then compare the number like a decimal. This is why <code class="call">.B3</code> comes before <code class="call">.B34</code>, and why <code class="call">.B99</code> still comes before <code class="call">.C1</code>.</p>
          <div class="demo-grid">
            <div class="demo-card">
              <div class="section-label">Label A</div>
              <div class="call-stack">
                <span>M</span>
                <span>412</span>
                <span>.S15</span>
                <span>Emaj. 1992</span>
              </div>
            </div>
            <div class="demo-card">
              <div class="section-label">Label B</div>
              <div class="call-stack">
                <span>M</span>
                <span>412</span>
                <span>.S415</span>
                <span>D.487 1970z</span>
              </div>
            </div>
          </div>
          <p class="demo-note">The <code class="call">M</code> line and class number match, so the Cutter decides this one. <strong>.S15 comes before .S415</strong>. Do not use <code class="call">Emaj.</code>, <code class="call">D.487</code>, or the year until the Cutter line is settled.</p>`,
        check: {
          prompt: "Which comes first?",
          choices: [
            "M 412 .S15 Emaj. 1992",
            "M 412 .S415 D.487 1970z"
          ],
          answer: 0,
          explain: ".S15 comes before .S415."
        },
        worked: `
          <div class="section-label">Worked Example</div>
          <p><code class="call">M 451 .J63 no. 8 1991</code></p>
          <p><code class="call">M 451 .S3 H4 Bd.2 v.1 c.2</code></p>
          <p>The main number matches. Now compare the next element: <strong>.J63 comes before .S3</strong>. So the first label comes first.</p>
        `,
        questions: [
          ["Which comes first?", "M 412 .S15 Emaj. 1992", "M 412 .S415 D.487 1970z", 0, ".S15 comes before .S415."],
          ["Which comes first?", "M 451 .J63 no. 8 1991", "M 451 .S3 H4 Bd.2 v.1 c.2", 0, ".J63 comes before .S3."],
          ["Which comes first?", "M 552 .A2 K.515 1956", "M 552 .M8 K.515 1956", 0, ".A2 comes before .M8."],
          ["Which comes first?", "M 412.4 .H4 H.XIV:7", "M 412.4 .S2 H.XIV:7", 0, ".H4 comes before .S2."],
          ["Which comes first?", "M 322 .R54 op. 2 v.1", "M 322 .S10 op. 2 v.1", 0, ".R54 comes before .S10."],
          ["Which comes first?", "M 451 .S3 H4 Bd.1 v.1 c.3", "M 451 .S4 H4 Bd.1 v.1 c.3", 0, ".S3 comes before .S4."],
          ["Which comes first?", "M 412 .S415 D.487 1970z", "M 412 .T1 D.487 1970z", 0, ".S415 comes before .T1."],
          ["Which comes first?", "M 552 .M8 K.515 1956", "M 552 .M9 K.515 1956", 0, ".M8 comes before .M9."],
          ["Which comes first?", "M 451 .J63 no. 8 1991", "M 451 .K1 no. 8 1991", 0, ".J63 comes before .K1."],
          ["Which comes first?", "M 322 .R54 op. 2 v.1", "M 322 .R60 op. 2 v.1", 0, ".R54 comes before .R60."]
        ]
      },
      {
        key: "module3",
        label: "Module 3",
        title: "Line 4 and Later Details",
        teach: `          <div class="section-label">Lesson</div>
          <p class="lesson-lead">Line 4 is where many music score labels start to feel busy. After <code class="call">M</code>, the class number, and the first Cutter match, the next line may be a year, another Cutter, a volume, a part, a number, a copy, or another local detail. The rule is still calm and simple: compare the first different line, use that difference to decide order, and keep later details out of the decision until you need them.</p>
          <div class="demo-grid">
            <div class="demo-card">
              <div class="section-label">Label A</div>
              <div class="call-stack">
                <span>M</span>
                <span>451</span>
                <span>.S3 H4</span>
                <span>Bd.1 v.1 c.3</span>
              </div>
            </div>
            <div class="demo-card">
              <div class="section-label">Label B</div>
              <div class="call-stack">
                <span>M</span>
                <span>451</span>
                <span>.S3 H4</span>
                <span>Bd.2 v.1 c.2</span>
              </div>
            </div>
          </div>
          <p class="demo-note">The earlier lines match, so line 4 decides it. <strong>Bd.1 comes before Bd.2</strong>. The copy number does not get to decide before the volume or part line that comes earlier.</p>`,
        check: {
          prompt: "Which comes first?",
          choices: [
            "M 451 .S3 H4 Bd.1 v.1 c.3",
            "M 451 .S3 H4 Bd.2 v.1 c.2"
          ],
          answer: 0,
          explain: "Bd.1 comes before Bd.2."
        },
        worked: `
          <div class="section-label">Worked Example</div>
          <p><code class="call">M 412 .S15 Emaj. 1992</code></p>
          <p><code class="call">M 412 .S15 Emaj. 2006bx</code></p>
          <p>The earlier parts match, so the year decides it: <strong>1992 comes before 2006bx</strong>.</p>
        `,
        questions: [
          ["Which comes first?", "M 451 .S3 H4 Bd.1 v.1 c.3", "M 451 .S3 H4 Bd.2 v.1 c.2", 0, "Bd.1 comes before Bd.2."],
          ["Which comes first?", "M 412 .S15 Emaj. 1992", "M 412 .S15 Emaj. 2006bx", 0, "1992 comes before 2006bx."],
          ["Which comes first?", "M 552 .M8 K.515 1956", "M 552 .M8 K.515 1970z", 0, "1956 comes before 1970z."],
          ["Which comes first?", "M 451 .J63 no. 8 1991", "M 451 .J63 no. 9 1991", 0, "No. 8 comes before no. 9."],
          ["Which comes first?", "M 322 .R54 op. 2 v.1", "M 322 .R54 op. 2 v.2", 0, "v.1 comes before v.2."],
          ["Which comes first?", "M 451 .S3 H4 Bd.2 v.1 c.2", "M 451 .S3 H4 Bd.2 v.1 c.3", 0, "c.2 comes before c.3."],
          ["Which comes first?", "M 412.4 .H4 H.XIII:7", "M 412.4 .H4 H.XIV:7", 0, "XIII comes before XIV."],
          ["Which comes first?", "M 412 .S415 D.487 1970z", "M 412 .S415 D.487 1992", 0, "1970z comes before 1992."],
          ["Which comes first?", "M 552 .M8 K.515 1956", "M 552 .M8 K.516 1956", 0, "K.515 comes before K.516."],
          ["Which comes first?", "M 451 .J63 no. 8 1991", "M 451 .J63 no. 8 2006bx", 0, "1991 comes before 2006bx."]
        ]
      }
    ];

    const cutterLetters = ["A", "B", "D", "H", "J", "K", "M", "R", "S", "T", "V"];
    const keyNames = ["Amaj.", "Cmin.", "Dmaj.", "Emaj.", "Gmin."];
    const romanNumerals = [
      { value: 1, text: "I" },
      { value: 2, text: "II" },
      { value: 3, text: "III" },
      { value: 4, text: "IV" },
      { value: 5, text: "V" },
      { value: 6, text: "VI" },
      { value: 7, text: "VII" },
      { value: 8, text: "VIII" },
      { value: 9, text: "IX" },
      { value: 10, text: "X" },
      { value: 11, text: "XI" },
      { value: 12, text: "XII" },
      { value: 13, text: "XIII" },
      { value: 14, text: "XIV" },
      { value: 15, text: "XV" },
      { value: 16, text: "XVI" },
      { value: 17, text: "XVII" },
      { value: 18, text: "XVIII" },
      { value: 19, text: "XIX" },
      { value: 20, text: "XX" }
    ];

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(items) {
      return items[randInt(0, items.length - 1)];
    }

    function randomMainValue() {
      const whole = randInt(300, 650);
      if (Math.random() < 0.22) {
        const tenths = randInt(1, 9);
        return { value: whole + tenths / 10, text: `${whole}.${tenths}` };
      }
      return { value: whole, text: String(whole) };
    }

    function makeDistinctMainValues(count) {
      const mains = [];
      const seen = new Set();
      while (mains.length < count) {
        const main = randomMainValue();
        if (!seen.has(main.text)) {
          seen.add(main.text);
          mains.push(main);
        }
      }
      return mains.sort((a, b) => a.value - b.value);
    }

    function randomCutter(forcedLetter) {
      return {
        letter: forcedLetter || pick(cutterLetters),
        number: randInt(10, 99)
      };
    }

    function formatCutter(cutter) {
      return `.${cutter.letter}${cutter.number}`;
    }

    function compareCutter(a, b) {
      const letterCompare = a.letter.localeCompare(b.letter);
      if (letterCompare !== 0) return letterCompare;
      return a.number - b.number;
    }

    function makeDistinctCutters() {
      const sameLetter = Math.random() < 0.65;
      let first;
      let second;

      if (sameLetter) {
        const letter = pick(cutterLetters);
        const numbers = [randInt(10, 99), randInt(10, 99)];
        while (numbers[1] === numbers[0]) numbers[1] = randInt(10, 99);
        first = { letter, number: numbers[0] };
        second = { letter, number: numbers[1] };
      } else {
        const letters = shuffle(cutterLetters).slice(0, 2);
        first = randomCutter(letters[0]);
        second = randomCutter(letters[1]);
      }

      return [first, second].sort(compareCutter);
    }

    function randomYear() {
      const value = randInt(1940, 2025);
      const suffix = Math.random() < 0.2 ? pick(["z", "bx"]) : "";
      return { value, text: `${value}${suffix}` };
    }

    function laterYear(startYear) {
      const value = Math.min(startYear + randInt(1, 25), 2026);
      const suffix = Math.random() < 0.25 ? pick(["z", "bx"]) : "";
      return { value, text: `${value}${suffix}` };
    }

    function randomRoman(min = 5, max = 18) {
      return romanNumerals[randInt(min - 1, max - 1)];
    }

    function randomTail() {
      const year = randomYear();
      const roman = randomRoman();
      const makers = [
        () => {
          const number = randInt(200, 620);
          return { text: `K.${number} ${year.text}`, key: ["K", number, year.value] };
        },
        () => {
          const number = randInt(100, 900);
          return { text: `D.${number} ${year.text}`, key: ["D", number, year.value] };
        },
        () => {
          const number = randInt(1, 12);
          return { text: `H.${roman.text}:${number}`, key: ["H", roman.value, number] };
        },
        () => {
          const opus = randInt(1, 80);
          const volume = randInt(1, 4);
          return { text: `op. ${opus} v.${volume}`, key: ["op", opus, "v", volume] };
        },
        () => {
          const number = randInt(1, 20);
          return { text: `no. ${number} ${year.text}`, key: ["no", number, year.value] };
        },
        () => {
          const bd = randInt(1, 4);
          const volume = randInt(1, 3);
          const copy = randInt(1, 3);
          return { text: `Bd.${bd} v.${volume} c.${copy}`, key: ["Bd", bd, "v", volume, "c", copy] };
        },
        () => {
          const keyName = pick(keyNames);
          return { text: `${keyName} ${year.text}`, key: ["key", keyNames.indexOf(keyName), year.value] };
        }
      ];
      return pick(makers)();
    }

    function makeOrderedTailPair() {
      const type = pick(["year", "bd", "volume", "copy", "number", "catalog", "roman"]);
      const year = randomYear();
      const later = laterYear(year.value);

      if (type === "year") {
        const workType = pick(["K", "D", "key"]);
        if (workType === "K") {
          const number = randInt(200, 620);
          return [
            { text: `K.${number} ${year.text}`, key: ["K", number, year.value], label: year.text },
            { text: `K.${number} ${later.text}`, key: ["K", number, later.value], label: later.text }
          ];
        }
        if (workType === "D") {
          const number = randInt(100, 900);
          return [
            { text: `D.${number} ${year.text}`, key: ["D", number, year.value], label: year.text },
            { text: `D.${number} ${later.text}`, key: ["D", number, later.value], label: later.text }
          ];
        }
        const keyName = pick(keyNames);
        const keyIndex = keyNames.indexOf(keyName);
        return [
          { text: `${keyName} ${year.text}`, key: ["key", keyIndex, year.value], label: year.text },
          { text: `${keyName} ${later.text}`, key: ["key", keyIndex, later.value], label: later.text }
        ];
      }

      if (type === "bd") {
        const first = randInt(1, 3);
        const second = first + randInt(1, 2);
        return [
          { text: `Bd.${first} v.1 c.1`, key: ["Bd", first, "v", 1, "c", 1], label: `Bd.${first}` },
          { text: `Bd.${second} v.1 c.1`, key: ["Bd", second, "v", 1, "c", 1], label: `Bd.${second}` }
        ];
      }

      if (type === "volume") {
        const opus = randInt(1, 80);
        const first = randInt(1, 3);
        const second = first + randInt(1, 2);
        return [
          { text: `op. ${opus} v.${first}`, key: ["op", opus, "v", first], label: `v.${first}` },
          { text: `op. ${opus} v.${second}`, key: ["op", opus, "v", second], label: `v.${second}` }
        ];
      }

      if (type === "copy") {
        const bd = randInt(1, 4);
        const volume = randInt(1, 3);
        const first = randInt(1, 2);
        const second = first + randInt(1, 2);
        return [
          { text: `Bd.${bd} v.${volume} c.${first}`, key: ["Bd", bd, "v", volume, "c", first], label: `c.${first}` },
          { text: `Bd.${bd} v.${volume} c.${second}`, key: ["Bd", bd, "v", volume, "c", second], label: `c.${second}` }
        ];
      }

      if (type === "number") {
        const first = randInt(1, 18);
        const second = first + randInt(1, 4);
        return [
          { text: `no. ${first} ${year.text}`, key: ["no", first, year.value], label: `no. ${first}` },
          { text: `no. ${second} ${year.text}`, key: ["no", second, year.value], label: `no. ${second}` }
        ];
      }

      if (type === "catalog") {
        const first = randInt(200, 615);
        const second = first + randInt(1, 8);
        return [
          { text: `K.${first} ${year.text}`, key: ["K", first, year.value], label: `K.${first}` },
          { text: `K.${second} ${year.text}`, key: ["K", second, year.value], label: `K.${second}` }
        ];
      }

      const firstRoman = randomRoman(5, 17);
      const secondRoman = romanNumerals[firstRoman.value + randInt(1, 2) - 1];
      const number = randInt(1, 12);
      return [
        { text: `H.${firstRoman.text}:${number}`, key: ["H", firstRoman.value, number], label: firstRoman.text },
        { text: `H.${secondRoman.text}:${number}`, key: ["H", secondRoman.value, number], label: secondRoman.text }
      ];
    }

    function compareSortKey(a, b) {
      const length = Math.max(a.length, b.length);
      for (let i = 0; i < length; i++) {
        if (a[i] === undefined) return -1;
        if (b[i] === undefined) return 1;
        if (a[i] === b[i]) continue;
        if (typeof a[i] === "number" && typeof b[i] === "number") {
          return a[i] - b[i];
        }
        return String(a[i]).localeCompare(String(b[i]), undefined, {
          numeric: true,
          sensitivity: "base"
        });
      }
      return 0;
    }

    function createLabelObject(options = {}) {
      const main = options.main || randomMainValue();
      const cutter = options.cutter || randomCutter();
      const tail = options.tail || randomTail();
      return {
        text: `M ${main.text} ${formatCutter(cutter)} ${tail.text}`,
        key: [main.value, cutter.letter, cutter.number].concat(tail.key),
        main,
        cutter,
        tail
      };
    }

    function compareLabels(a, b) {
      return compareSortKey(a.key, b.key);
    }

    function buildQuestion(firstText, secondText, explain) {
      const choices = Math.random() < 0.5 ? [firstText, secondText] : [secondText, firstText];
      return ["Which comes first?", choices[0], choices[1], choices[0] === firstText ? 0 : 1, explain];
    }

    function buildQuestionSet(factory, count) {
      const questions = [];
      const seen = new Set();
      let attempts = 0;
      while (questions.length < count && attempts < count * 60) {
        attempts += 1;
        const question = factory();
        const key = [question[1], question[2]].sort().join(" | ");
        if (!seen.has(key)) {
          seen.add(key);
          questions.push(question);
        }
      }
      while (questions.length < count) questions.push(factory());
      return questions;
    }

    function makeMainNumberQuestion() {
      const mains = makeDistinctMainValues(2);
      const lower = createLabelObject({ main: mains[0] });
      const higher = createLabelObject({ main: mains[1] });
      return buildQuestion(lower.text, higher.text, `${lower.main.text} comes before ${higher.main.text}.`);
    }

    function makeNextElementQuestion() {
      const main = randomMainValue();
      const tail = randomTail();
      const cutters = makeDistinctCutters();
      const lower = createLabelObject({ main, cutter: cutters[0], tail });
      const higher = createLabelObject({ main, cutter: cutters[1], tail });
      return buildQuestion(lower.text, higher.text, `${formatCutter(lower.cutter)} comes before ${formatCutter(higher.cutter)}.`);
    }

    function makeLaterDetailQuestion() {
      const main = randomMainValue();
      const cutter = randomCutter();
      const tails = makeOrderedTailPair();
      const lower = createLabelObject({ main, cutter, tail: tails[0] });
      const higher = createLabelObject({ main, cutter, tail: tails[1] });
      return buildQuestion(lower.text, higher.text, `${tails[0].label} comes before ${tails[1].label}.`);
    }

    function generateAllModuleQuestions() {
      return {
        module1: buildQuestionSet(makeMainNumberQuestion, QUESTIONS_PER_MODULE),
        module2: buildQuestionSet(makeNextElementQuestion, QUESTIONS_PER_MODULE),
        module3: buildQuestionSet(makeLaterDetailQuestion, QUESTIONS_PER_MODULE)
      };
    }

    function getModuleQuestions(mod) {
      return state.generatedQuestions && state.generatedQuestions[mod.key]
        ? state.generatedQuestions[mod.key]
        : mod.questions;
    }

    function generateFinalDragOrder() {
      const mains = makeDistinctMainValues(3);
      const cutters = makeDistinctCutters();
      const detailCutter = randomCutter();
      const detailTails = makeOrderedTailPair();
      const labels = [
        createLabelObject({ main: mains[0] }),
        createLabelObject({ main: mains[1], cutter: cutters[0], tail: randomTail() }),
        createLabelObject({ main: mains[1], cutter: cutters[1], tail: randomTail() }),
        createLabelObject({ main: mains[2], cutter: detailCutter, tail: detailTails[0] }),
        createLabelObject({ main: mains[2], cutter: detailCutter, tail: detailTails[1] })
      ];
      return labels
        .sort(compareLabels)
        .slice(0, FINAL_DRAG_COUNT)
        .map(label => label.text);
    }

    let state = {};

    function resetState() {
      state = {
        step: 0,
        phase: "teach",
        qIndex: 0,
        score: 0,
        submitted: false,
        student: {
          realName: realNameInput.value.trim(),
          preferredName: preferredNameInput.value.trim(),
          sbuEmail: emailInput.value.trim()
        },
        moduleCorrect: {
          module1: 0,
          module2: 0,
          module3: 0
        },
        generatedQuestions: generateAllModuleQuestions(),
        finalDragOrder: generateFinalDragOrder(),
        finalDragPassed: false
      };
    }

    function showIntakeMessage(message, type = "warn") {
      if (!message) {
        intakeFeedback.innerHTML = "";
        return;
      }
      intakeFeedback.innerHTML = `<div class="feedback ${type}">${message}</div>`;
    }

    function validateStudentInfo() {
      const real = realNameInput.value.trim();
      const preferred = preferredNameInput.value.trim();
      const email = emailInput.value.trim();

      if (!real) return "Please enter the student’s real name.";
      if (!preferred) return "Please enter the student’s preferred name.";
      if (!/^[A-Za-z0-9._%+-]+@stonybrook\.edu$/i.test(email)) {
        return "Please enter a valid SBU email ending in @stonybrook.edu.";
      }
      return "";
    }

    function startTraining() {
      const validationMessage = validateStudentInfo();
      if (validationMessage) {
        showIntakeMessage(validationMessage);
        return;
      }
      showIntakeMessage("");
      resetState();
      app.classList.remove("hidden");
      render();
    }

    function render() {
      if (state.step < modules.length) {
        renderModule();
      } else if (state.step === modules.length) {
        renderFinalDrag();
      } else {
        renderDone();
      }
      updateProgress();
    }

    function updateProgress() {
      const totalStages = modules.length + 2;
      const currentStage = Math.min(state.step + 1, totalStages);
      stageLabel.textContent =
        state.step < modules.length ? modules[state.step].label :
        state.step === modules.length ? "Final Activity" :
        "Complete";
      bar.style.width = `${(currentStage / totalStages) * 100}%`;
    }

    function renderModule() {
      const mod = modules[state.step];

      if (state.phase === "teach") {
        screen.innerHTML = `
          <h2>${mod.title}</h2>
          <div class="lesson-box">${mod.teach}</div>
          <button onclick="goCheck()">Continue</button>
        `;
        return;
      }

      if (state.phase === "check") {
        screen.innerHTML = `
          <h2>${mod.title}</h2>
          <div class="check-box">
            <div class="section-label">Quick Check — must be correct to continue</div>
            <p>${mod.check.prompt}</p>
            <button class="choice" onclick="checkTeachAnswer(0)">${mod.check.choices[0]}</button>
            <button class="choice" onclick="checkTeachAnswer(1)">${mod.check.choices[1]}</button>
            <div id="checkFeedback"></div>
          </div>
        `;
        return;
      }

      if (state.phase === "worked") {
        screen.innerHTML = `
          <h2>${mod.title}</h2>
          <div class="worked-box">${mod.worked}</div>
          <button onclick="goQuiz()">Continue</button>
        `;
        return;
      }

      const questions = getModuleQuestions(mod);
      const q = questions[state.qIndex];
      screen.innerHTML = `
        <h2>${mod.title}</h2>
        <p><strong>Question ${state.qIndex + 1} of ${questions.length}</strong></p>
        <p>${q[0]}</p>
        <button class="choice" onclick="answerQuestion(0)">${q[1]}</button>
        <button class="choice" onclick="answerQuestion(1)">${q[2]}</button>
        <div id="quizFeedback"></div>
      `;
    }

    function goCheck() {
      state.phase = "check";
      render();
    }

    function checkTeachAnswer(choice) {
      const mod = modules[state.step];
      const feedback = document.getElementById("checkFeedback");
      const correct = choice === mod.check.answer;

      feedback.innerHTML = `
        <div class="feedback ${correct ? "good" : "bad"}">
          ${correct ? "Correct." : "Not quite."} ${mod.check.explain}
        </div>
      `;

      if (correct) {
        feedback.innerHTML += `<button onclick="goWorked()">Continue</button>`;
        document.querySelectorAll(".choice").forEach(btn => btn.disabled = true);
      }
    }

    function goWorked() {
      state.phase = "worked";
      render();
    }

    function goQuiz() {
      state.phase = "quiz";
      render();
    }

    function answerQuestion(choice) {
      const mod = modules[state.step];
      const q = getModuleQuestions(mod)[state.qIndex];
      const correct = choice === q[3];

      if (correct) {
        state.score += 1;
        state.moduleCorrect[mod.key] += 1;
      }

      const feedback = document.getElementById("quizFeedback");
      feedback.innerHTML = `
        <div class="feedback ${correct ? "good" : "bad"}">
          ${correct ? "Correct." : "Not quite."} ${q[4]}
        </div>
        <button onclick="nextQuestion()">Continue</button>
      `;

      document.querySelectorAll(".choice").forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
      const mod = modules[state.step];
      const questions = getModuleQuestions(mod);
      state.qIndex += 1;
      if (state.qIndex >= questions.length) {
        state.step += 1;
        state.phase = "teach";
        state.qIndex = 0;
      }
      render();
    }

    function makeDraggable(text, id) {
      const div = document.createElement("div");
      div.className = "draggable";
      div.draggable = true;
      div.id = id;
      div.dataset.value = text;
      div.textContent = text;
      return div;
    }

    function makeSlot(n) {
      const div = document.createElement("div");
      div.className = "slot";
      div.innerHTML = `<div class="slotlabel">Position ${n}</div>`;
      return div;
    }

    function shuffle(arr) {
      const copy = arr.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function renderFinalDrag() {
      if (!state.finalDragOrder) state.finalDragOrder = generateFinalDragOrder();
      const correctOrder = state.finalDragOrder;
      const shuffled = shuffle(correctOrder);

      screen.innerHTML = `
        <h2>Final Activity</h2>
        <div class="lesson-box">
          <div class="section-label">Final Review</div>
          <p class="lesson-lead">Before you drag, use the same careful reading process from the lessons. Read each label as if it were stacked vertically: <code class="call">M</code> first, then the class number, then the Cutter, then line 4 or any later details. Stop at the first difference; that is the line that decides shelf order. Accuracy matters more than speed.</p>
          <p class="demo-note">Demonstration: if two labels both start <code class="call">M 1001 .B34</code>, then a fourth line of <code class="call">1998</code> shelves before <code class="call">2023</code>. If the class numbers differ earlier, use the class numbers instead and ignore the later lines.</p>
        </div>
        <p>Drag each label into the correct order from first to last.</p>
        <p class="muted">Use the same comparison logic you practiced: main number first, then the next element, then line 4 and later details if needed.</p>
        <h3>Label Bank</h3>
        <div class="sortbank" id="bank"></div>
        <h3>Order Slots</h3>
        <div class="sortslots" id="slots"></div>
        <div id="dragFeedback"></div>
        <button onclick="checkDrag()">Check Order</button>
        <button class="secondary" onclick="renderFinalDrag()">Reset</button>
      `;

      const bank = document.getElementById("bank");
      const slots = document.getElementById("slots");

      shuffled.forEach((item, i) => bank.appendChild(makeDraggable(item, "item-" + i)));
      correctOrder.forEach((_, i) => slots.appendChild(makeSlot(i + 1)));

      enableDnD();
    }

    function enableDnD() {
      document.querySelectorAll(".draggable").forEach(el => {
        el.addEventListener("dragstart", function(e) {
          e.dataTransfer.setData("text/plain", this.id);
        });
      });

      document.querySelectorAll(".slot").forEach(slot => {
        slot.addEventListener("dragover", function(e) {
          e.preventDefault();
          this.classList.add("drag-over");
        });

        slot.addEventListener("dragleave", function() {
          this.classList.remove("drag-over");
        });

        slot.addEventListener("drop", function(e) {
          e.preventDefault();
          this.classList.remove("drag-over");
          const id = e.dataTransfer.getData("text/plain");
          const el = document.getElementById(id);
          const bank = document.getElementById("bank");
          if (!el) return;

          const existing = this.querySelector(".draggable");
          if (existing && bank) bank.appendChild(existing);

          this.appendChild(el);
        });
      });

      const bank = document.getElementById("bank");
      bank.addEventListener("dragover", e => e.preventDefault());
      bank.addEventListener("drop", function(e) {
        e.preventDefault();
        const id = e.dataTransfer.getData("text/plain");
        const el = document.getElementById(id);
        if (el) bank.appendChild(el);
      });
    }

    function checkDrag() {
      const correctOrder = state.finalDragOrder || [];
      const chosen = [];
      document.querySelectorAll(".slot").forEach(slot => {
        const item = slot.querySelector(".draggable");
        if (item) chosen.push(item.dataset.value);
      });

      const feedback = document.getElementById("dragFeedback");

      if (chosen.length !== correctOrder.length) {
        feedback.innerHTML = `<div class="feedback warn">Please place every label into a slot before checking the order.</div>`;
        return;
      }

      let ok = true;
      for (let i = 0; i < correctOrder.length; i++) {
        if (chosen[i] !== correctOrder[i]) {
          ok = false;
          break;
        }
      }

      state.finalDragPassed = ok;

      feedback.innerHTML = `
        <div class="feedback ${ok ? "good" : "bad"}">
          ${ok ? "Correct. You placed the labels in the right order." : "Not quite. The final order is not correct yet."}
        </div>
        <button onclick="finishTraining()">Continue</button>
      `;
    }

    function finishTraining() {
      state.step += 1;
      render();
    }

    function buildPayload() {
      const module1Passed = state.moduleCorrect.module1 >= MODULE_PASSING_SCORE;
      const module2Passed = state.moduleCorrect.module2 >= MODULE_PASSING_SCORE;
      const module3Passed = state.moduleCorrect.module3 >= MODULE_PASSING_SCORE;
      const totalModulesPassed = [module1Passed, module2Passed, module3Passed, state.finalDragPassed].filter(Boolean).length;
      const totalScore = state.score + (state.finalDragPassed ? 1 : 0);
      const cumulativePassingScore = MODULE_PASSING_SCORE * modules.length + 1;
      const overallPass = module1Passed && module2Passed && module3Passed && state.finalDragPassed;

      return {
        timestamp: new Date().toISOString(),
        realName: state.student.realName,
        preferredName: state.student.preferredName,
        sbuEmail: state.student.sbuEmail,

        module1Completed: true,
        module1Passed: module1Passed,

        module2Completed: true,
        module2Passed: module2Passed,

        module3Completed: true,
        module3Passed: module3Passed,

        module4Completed: true,
        module4Passed: state.finalDragPassed,

        totalModulesCompleted: 4,
        totalModulesPassed: totalModulesPassed,

        cumulativeCheckPassed: totalScore >= cumulativePassingScore,
        finalDragDropPassed: state.finalDragPassed,

        totalScore: totalScore,
        passFail: overallPass ? "Pass" : "Fail",
        attemptCount: 1
      };
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        [String.fromCharCode(34)]: "&quot;",
        [String.fromCharCode(39)]: "&#39;"
      }[char]));
    }

    function renderDone() {
      const payload = buildPayload();
      const maxScore = QUESTIONS_PER_MODULE * modules.length + 1;
      const display = {
        preferredName: escapeHtml(payload.preferredName),
        realName: escapeHtml(payload.realName),
        sbuEmail: escapeHtml(payload.sbuEmail)
      };

      screen.innerHTML = `
        <h2>Training Complete</h2>
        <div class="summary-grid">
          <div class="summary-box"><div class="label">Student</div><div class="value">${display.preferredName}</div></div>
          <div class="summary-box"><div class="label">Real Name</div><div class="value">${display.realName}</div></div>
          <div class="summary-box"><div class="label">Email</div><div class="value">${display.sbuEmail}</div></div>
          <div class="summary-box"><div class="label">Total Score</div><div class="value">${payload.totalScore} / ${maxScore}</div></div>
          <div class="summary-box"><div class="label">Module 1</div><div class="value">${state.moduleCorrect.module1} / ${QUESTIONS_PER_MODULE}</div></div>
          <div class="summary-box"><div class="label">Module 2</div><div class="value">${state.moduleCorrect.module2} / ${QUESTIONS_PER_MODULE}</div></div>
          <div class="summary-box"><div class="label">Module 3</div><div class="value">${state.moduleCorrect.module3} / ${QUESTIONS_PER_MODULE}</div></div>
          <div class="summary-box"><div class="label">Final Drag</div><div class="value">${state.finalDragPassed ? "Passed" : "Not Passed"}</div></div>
          <div class="summary-box"><div class="label">Overall Result</div><div class="value">${payload.passFail}</div></div>
        </div>

        <button id="submitBtn" onclick="submitResults()">Submit Results</button>
        <div id="submitStatus"></div>
      `;
    }

    async function submitResults() {
      const status = document.getElementById("submitStatus");
      const payload = buildPayload();

      if (state.submitted) {
        status.innerHTML = `<div class="feedback good">Results already submitted for this run.</div>`;
        return;
      }

      status.innerHTML = `<div class="feedback warn">Submitting results...</div>`;

      try {
        await fetch(APP_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        state.submitted = true;
        status.innerHTML = `<div class="feedback good">Submission sent. Check the sheet in a few seconds.</div>`;
      } catch (error) {
        status.innerHTML = `<div class="feedback bad">Submission failed in the browser.</div>`;
      }
    }

    document.getElementById("startBtn").addEventListener("click", startTraining);
  </script>
</body>
</html>
