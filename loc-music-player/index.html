<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LOC Music Player</title>
  <style>
    :root{
      --bg:#020509;--panel:#071018;--panel2:#0b1420;--ink:#f4f8ff;--muted:#83a0bb;--line:#123046;
      --cyan:#00e5ff;--mag:#ff2bd6;--violet:#8d5cff;--green:#9cff5f;--warn:#ffd15c;--bad:#ff5c8a;
      --shadow:0 0 28px rgba(0,229,255,.11),0 0 42px rgba(255,43,214,.08)
    }
    *{box-sizing:border-box}
    html{min-height:100%;background:var(--bg);overflow-y:auto}
    body{margin:0;min-height:100%;overflow-x:hidden;overflow-y:auto;background:radial-gradient(circle at 20% 0%,rgba(0,229,255,.12),transparent 28%),radial-gradient(circle at 90% 10%,rgba(255,43,214,.12),transparent 25%),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;line-height:1.35}
    button,input,select{font:inherit}button{cursor:pointer}.app{width:min(1120px,calc(100% - 28px));margin:20px auto 36px;border:1px solid rgba(0,229,255,.18);border-radius:24px;background:rgba(2,8,14,.86);box-shadow:var(--shadow);padding:14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid rgba(0,229,255,.18);border-radius:18px;background:linear-gradient(90deg,rgba(0,229,255,.07),rgba(255,43,214,.06));padding:14px 18px;margin-bottom:12px}.brand{display:flex;gap:14px;align-items:center;min-width:0}.mark{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--cyan);font-weight:900;letter-spacing:.28em;font-size:.78rem}.brand h1{font-size:1.45rem;margin:0;letter-spacing:-.03em}.brand h1 span{color:var(--mag)}.tag{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.72rem;letter-spacing:.32em;color:var(--muted);text-transform:uppercase;white-space:nowrap}.player{border:1px solid rgba(0,229,255,.18);border-radius:18px;background:rgba(7,16,24,.92);padding:14px 16px;margin-bottom:10px}.player-main{display:grid;grid-template-columns:84px minmax(0,1fr) minmax(310px,430px);gap:16px;align-items:center}.cover{width:84px;height:84px;border-radius:12px;border:1px solid rgba(0,229,255,.38);background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(255,43,214,.12));display:grid;place-items:center;overflow:hidden;color:var(--cyan);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:900;font-size:1.25rem}.cover img{width:100%;height:100%;object-fit:cover}.now-label{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--mag);font-size:.68rem;letter-spacing:.32em;font-weight:900;text-transform:uppercase}.title{font-size:1.45rem;font-weight:900;line-height:1.05;margin:4px 0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.creator{color:#a7c3dc;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.player-actions{display:grid;gap:8px;align-items:center}.transport{display:flex;align-items:center;justify-content:center;gap:10px}.round{width:42px;height:42px;border-radius:999px;border:1px solid rgba(0,229,255,.22);background:#06121c;color:var(--ink);font-weight:900}.round.primary{width:54px;height:54px;border:0;background:var(--mag);color:#050608;font-size:1.25rem}.round:hover,.pill:hover,.row button:hover{filter:brightness(1.12)}audio{width:100%;height:34px;filter:invert(1) hue-rotate(145deg) saturate(.9);opacity:.9}.player-status{text-align:center;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#78a4c7;font-size:.82rem}.moreline{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}.linklike{background:transparent;border:1px solid rgba(255,43,214,.45);color:#ffd6f6;border-radius:999px;padding:8px 12px;font-weight:800;letter-spacing:.04em}.copy-ok{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--green);font-size:.78rem}.meta-frame{display:none;margin-top:10px;border:1px solid rgba(0,229,255,.2);border-radius:16px;background:rgba(2,8,14,.78);padding:14px}.meta-frame.open{display:block}.meta-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}.meta-head h2{margin:0;font-size:1rem}.meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.meta-box{border:1px solid rgba(0,229,255,.12);border-radius:12px;background:rgba(11,20,32,.75);padding:10px}.meta-k{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--cyan);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}.meta-v{color:#dcecff;word-break:break-word;font-size:.9rem}.meta-desc{grid-column:1/-1}.controls{border:1px solid rgba(0,229,255,.16);border-radius:18px;background:rgba(7,16,24,.92);padding:14px 16px;margin-bottom:10px}.control-grid{display:grid;grid-template-columns:minmax(220px,1.2fr) minmax(160px,.7fr) minmax(200px,1fr) auto auto;gap:12px;align-items:end}.field label{display:block;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#6f98b9;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;font-weight:900;margin:0 0 5px}.field input,.field select{width:100%;height:42px;border:1px solid rgba(0,229,255,.2);background:#050b12;color:var(--ink);border-radius:14px;padding:0 14px;outline:none}.field input:focus,.field select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1)}.pill{height:42px;border-radius:999px;border:0;background:var(--cyan);color:#041015;font-weight:950;padding:0 22px;letter-spacing:.05em;white-space:nowrap}.pill.alt{border:1px solid rgba(255,43,214,.5);background:transparent;color:#ffd6f6}.advanced{display:none;margin-top:12px;border-top:1px solid rgba(0,229,255,.13);padding-top:12px}.advanced.open{display:block}.adv-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.adv-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}.status{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#78a4c7;font-size:.78rem}.tracks{border:1px solid rgba(0,229,255,.16);border-radius:18px;background:rgba(7,16,24,.92);overflow:visible}.tracks-head,.row{display:grid;grid-template-columns:64px minmax(0,1.65fr) minmax(150px,.8fr) 100px 92px;gap:14px;align-items:center}.tracks-head{padding:10px 16px;border-bottom:1px solid rgba(0,229,255,.16);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#6f98b9;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;font-weight:900}.row{min-height:74px;padding:10px 16px;border-bottom:1px solid rgba(0,229,255,.09)}.row:last-child{border-bottom:0}.playbtn{width:42px;height:42px;border-radius:999px;border:0;background:var(--cyan);color:#041015;font-weight:950}.song-title{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.song-sub{color:#89afca;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.small{color:#9bb9ce;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.info{height:36px;border-radius:999px;border:1px solid rgba(0,229,255,.2);background:transparent;color:#b9d9ef;padding:0 16px}.empty{padding:22px;color:#83a0bb}.loader{display:none;margin-left:8px;color:var(--green)}.loading .loader{display:inline}.sr{position:absolute;left:-9999px}@media(max-width:880px){.app{width:calc(100% - 16px);margin:8px auto 20px;padding:10px}.topbar{align-items:flex-start}.tag{display:none}.player-main{grid-template-columns:62px minmax(0,1fr);gap:12px}.cover{width:62px;height:62px;font-size:.9rem}.player-actions{grid-column:1/-1}.title{font-size:1.12rem}.control-grid{grid-template-columns:1fr 1fr}.control-grid .field:nth-child(3){grid-column:1/-1}.pill{width:100%}.adv-grid{grid-template-columns:1fr}.tracks-head{display:none}.row{grid-template-columns:48px minmax(0,1fr) 70px;gap:10px}.row .small.collection{display:none}.row .small.date{font-size:.72rem}.row .info{grid-column:2/4;width:max-content}.meta-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="topbar">
      <div class="brand"><div class="mark">LOC</div><h1>Music<span>Player</span></h1></div>
      <div class="tag">5 tracks · music research mode</div>
    </header>

    <section class="player" aria-label="Player">
      <div class="player-main">
        <div class="cover" id="cover">LOC</div>
        <div class="now">
          <div class="now-label">Now Playing</div>
          <div class="title" id="nowTitle">Nothing playing</div>
          <div class="creator" id="nowCreator">Choose a genre/subgenre and decade, then play a song.</div>
          <div class="moreline">
            <button class="linklike" id="seeMoreBtn" type="button" disabled>See More</button>
            <span class="copy-ok" id="copyNotice"></span>
          </div>
        </div>
        <div class="player-actions">
          <div class="transport">
            <button class="round" id="prevBtn" type="button" title="Previous">‹</button>
            <button class="round primary" id="mainPlayBtn" type="button" title="Play/Pause">▶</button>
            <button class="round" id="nextBtn" type="button" title="Next">›</button>
          </div>
          <audio id="audio" controls preload="metadata"></audio>
          <div class="player-status" id="playerStatus">0 queued · direct LOC audio when available</div>
        </div>
      </div>
      <div class="meta-frame" id="metaFrame" aria-live="polite"></div>
    </section>

    <section class="controls" id="controls">
      <div class="control-grid">
        <div class="field"><label for="genreSelect">Genre / Subgenre</label><select id="genreSelect"></select></div>
        <div class="field"><label for="decadeSelect">Decade</label><select id="decadeSelect"></select></div>
        <div class="field"><label for="keywordInput">Search Within</label><input id="keywordInput" placeholder="optional keyword" /></div>
        <button class="pill" id="loadBtn" type="button">Load 5</button>
        <button class="pill alt" id="advancedBtn" type="button">Advanced</button>
      </div>
      <div class="advanced" id="advancedPanel">
        <div class="adv-grid">
          <div class="field"><label for="advKeyword">Keyword</label><input id="advKeyword" placeholder="e.g. violin concerto" /></div>
          <div class="field"><label for="advTitle">Title</label><input id="advTitle" placeholder="title contains" /></div>
          <div class="field"><label for="advCreator">Creator</label><input id="advCreator" placeholder="composer / performer" /></div>
          <div class="field"><label for="advSubject">Subject / Genre</label><input id="advSubject" placeholder="ragtime, blues, opera" /></div>
          <div class="field"><label for="advCollection">Collection</label><input id="advCollection" placeholder="national jukebox" /></div>
          <div class="field"><label for="advItemType">Item Type</label><select id="advItemType"><option value="">Any audio/music</option><option>Musical sound recording</option><option>Notated music</option><option>Audio Recording</option></select></div>
          <div class="field"><label for="advSort">Sort</label><select id="advSort"><option value="relevance">Relevance</option><option value="date">Date</option><option value="title">Title</option></select></div>
          <div class="field"><label for="advAccess">Access</label><select id="advAccess"><option value="">Any</option><option value="online-format:audio">Online audio</option><option value="access-restricted:false">Likely open</option></select></div>
        </div>
        <div class="adv-actions">
          <div class="status" id="advStatus">Advanced search narrows the LOC query but still returns 5 max.</div>
          <div><button class="pill alt" id="clearAdvBtn" type="button">Clear</button><button class="pill" id="runAdvBtn" type="button">Run Advanced</button></div>
        </div>
      </div>
      <div class="status" id="status">Ready.</div>
    </section>

    <section class="tracks" aria-label="Songs">
      <div class="tracks-head"><div></div><div>Song</div><div>Collection</div><div>Date</div><div></div></div>
      <div id="trackList"><div class="empty">Load 5 tracks to start.</div></div>
    </section>
  </main>

  <script>
    const MAX_TRACKS=5;
    const genreMap=[
      ['Jazz — Any','jazz'],['Jazz — Ragtime','ragtime'],['Jazz — Swing','swing'],['Jazz — Big Band','big band'],['Blues — Any','blues'],['Blues — Vocal','vocal blues'],['Blues — Guitar','guitar blues'],['Popular — Any','popular music'],['Popular — Songs','popular songs'],['Popular — Dance Music','dance music'],['Dance — Waltz','waltz'],['Dance — Foxtrot','foxtrot'],['Dance — Tango','tango'],['Dance — Polka','polka'],['Marches / Band — Any','marches band music'],['Marches / Band — Military','military marches'],['Patriotic','patriotic music'],['Classical — Any','classical music'],['Classical — Opera','opera'],['Classical — Orchestral','orchestral music'],['Classical — Chamber','chamber music'],['Classical — Piano','piano music'],['Classical — Violin','violin music'],['Classical — Concerto','concerto'],['Folk — Any','folk music'],['Folk — Ballads','ballads'],['Folk — Traditional','traditional music'],['Country / Rural','country music'],['Gospel / Sacred — Any','gospel music'],['Religious / Hymns','hymns'],['Spirituals','spirituals'],['Latin / Caribbean — Any','latin music'],['Caribbean','caribbean music'],['Puerto Rican','puerto rican music'],['Cuban','cuban music'],['Mexican','mexican music'],['World / Regional — Any','world music'],['African American','african american music'],['Native American','native american music'],['Yiddish / Jewish','jewish music'],['Irish','irish music'],['Italian','italian music'],['German','german music'],['French','french music'],['Instruments — Banjo','banjo music'],['Instruments — Violin','violin music'],['Instruments — Piano','piano music'],['Instruments — Guitar','guitar music'],['Instruments — Brass','brass music'],['Spoken / Stage — Theater','musical theater'],['Spoken / Stage — Vaudeville','vaudeville'],['Spoken / Stage — Comedy','comedy recordings'],['Early Recordings','early sound recordings'],['National Jukebox','national jukebox']
    ];
    const decadeOptions=[['','Any decade'],['before1890','Before 1890'],['1890','1890s'],['1900','1900s'],['1910','1910s'],['1920','1920s'],['1930','1930s'],['1940','1940s'],['1950','1950s'],['1960','1960s'],['1970','1970s'],['1980','1980s'],['1990','1990s'],['2000','2000s'],['2010','2010s'],['2020','2020s']];
    const $=id=>document.getElementById(id);
    const genreSelect=$('genreSelect'),decadeSelect=$('decadeSelect'),keywordInput=$('keywordInput'),trackList=$('trackList'),status=$('status'),audio=$('audio'),nowTitle=$('nowTitle'),nowCreator=$('nowCreator'),playerStatus=$('playerStatus'),cover=$('cover'),metaFrame=$('metaFrame'),seeMoreBtn=$('seeMoreBtn'),copyNotice=$('copyNotice');
    let tracks=[],currentIndex=-1,currentTrack=null;
    function init(){genreMap.forEach(([label,val])=>genreSelect.add(new Option(label,val)));decadeOptions.forEach(([val,label])=>decadeSelect.add(new Option(label,val)));$('loadBtn').addEventListener('click',()=>loadTracks(false));$('advancedBtn').addEventListener('click',()=>{$('advancedPanel').classList.toggle('open')});$('runAdvBtn').addEventListener('click',()=>loadTracks(true));$('clearAdvBtn').addEventListener('click',clearAdvanced);$('mainPlayBtn').addEventListener('click',togglePlay);$('prevBtn').addEventListener('click',prevTrack);$('nextBtn').addEventListener('click',nextTrack);seeMoreBtn.addEventListener('click',()=>currentTrack&&showMeta(currentTrack));audio.addEventListener('play',()=>{$('mainPlayBtn').textContent='Ⅱ'});audio.addEventListener('pause',()=>{$('mainPlayBtn').textContent='▶'});loadTracks(false)}
    function clearAdvanced(){['advKeyword','advTitle','advCreator','advSubject','advCollection'].forEach(id=>$(id).value='');$('advItemType').value='';$('advSort').value='relevance';$('advAccess').value='';}
    function decadeQuery(){const d=decadeSelect.value;if(!d)return'';if(d==='before1890')return ' date:1800-1889';const start=Number(d),end=start+9;return ` date:${start}-${end}`}
    function clean(v){if(Array.isArray(v))return v.filter(Boolean).join(', ');return v||''}
    function queryFromAdvanced(){const bits=[];if($('advKeyword').value.trim())bits.push($('advKeyword').value.trim());if($('advTitle').value.trim())bits.push(`title:${$('advTitle').value.trim()}`);if($('advCreator').value.trim())bits.push(`contributor:${$('advCreator').value.trim()}`);if($('advSubject').value.trim())bits.push($('advSubject').value.trim());if($('advCollection').value.trim())bits.push($('advCollection').value.trim());if($('advItemType').value)bits.push($('advItemType').value);if($('advAccess').value)bits.push($('advAccess').value);return bits.join(' ')}
    function baseQuery(useAdvanced){let q='online-format:audio music';if(useAdvanced){q+=' '+queryFromAdvanced()}else{const g=genreSelect.value;if(g)q+=' '+g;if(keywordInput.value.trim())q+=' '+keywordInput.value.trim();}q+=decadeQuery();return q.trim()}
    async function loadTracks(useAdvanced){document.body.classList.add('loading');trackList.innerHTML='<div class="empty">Searching LOC audio… <span class="loader">█</span></div>';status.textContent='Searching Library of Congress…';try{const q=baseQuery(useAdvanced);const sort=useAdvanced?$('advSort').value:'relevance';const params=new URLSearchParams({fo:'json',c:String(MAX_TRACKS),q,fa:'online-format:audio'});if(sort&&sort!=='relevance')params.set('sp','1');const url=`https://www.loc.gov/search/?${params.toString()}`;const res=await fetch(url);if(!res.ok)throw new Error('LOC request failed');const data=await res.json();tracks=(data.results||[]).slice(0,MAX_TRACKS).map(normalize).filter(Boolean);renderTracks();status.textContent=`Loaded ${tracks.length} track${tracks.length===1?'':'s'} · max ${MAX_TRACKS}.`;playerStatus.textContent=`${tracks.length} queued · direct LOC audio when available`;if(!tracks.length)trackList.innerHTML='<div class="empty">No tracks found. Try another genre, decade, or keyword.</div>'}catch(err){status.textContent='Search failed. Try again.';trackList.innerHTML='<div class="empty">Could not load LOC results. Check connection or try another search.</div>'}finally{document.body.classList.remove('loading')}}
    function normalize(item){const files=item.resources?.flatMap(r=>r.files||[])||[];const audioFile=files.find(f=>/\.mp3(\?|$)|\.wav(\?|$)|\.m4a(\?|$)|\.ogg(\?|$)/i.test(f.url||''));const thumb=item.image_url?.[0]||item.image_url||item.thumbnail_url||'';return{raw:item,title:item.title||item.item?.title||'Untitled',creator:clean(item.contributor||item.item?.contributors||item.creator)||'Unknown creator',date:item.date||item.item?.date||'',collection:clean(item.partof||item.collection)||'',description:clean(item.description||item.item?.description)||'No description supplied by LOC.',subject:clean(item.subject)||'',url:item.url||item.item?.url||'',audio:audioFile?.url||'',thumb,status:audioFile?.url?'Playable direct LOC audio':'Metadata only / no direct audio exposed'}}
    function renderTracks(){trackList.innerHTML='';tracks.forEach((t,i)=>{const row=document.createElement('div');row.className='row';row.innerHTML=`<button class="playbtn" type="button" title="Play">▶</button><div><div class="song-title">${esc(t.title)}</div><div class="song-sub">${esc(t.creator)}</div></div><div class="small collection">${esc(t.collection||'LOC')}</div><div class="small date">${esc(t.date||'n.d.')}</div><button class="info" type="button">INFO</button>`;row.querySelector('.playbtn').addEventListener('click',()=>playTrack(i));row.querySelector('.info').addEventListener('click',()=>showMeta(t));trackList.appendChild(row)})}
    function playTrack(i){const t=tracks[i];if(!t)return;currentIndex=i;currentTrack=t;nowTitle.textContent=t.title;nowCreator.textContent=t.creator;seeMoreBtn.disabled=false;copyNotice.textContent='';if(t.thumb){cover.innerHTML=`<img alt="" src="${escAttr(t.thumb)}">`}else{cover.textContent='LOC'}if(t.audio){audio.src=t.audio;audio.play().catch(()=>{});playerStatus.textContent=`${tracks.length} queued · playing direct LOC audio`}else{audio.removeAttribute('src');audio.load();playerStatus.textContent=`${tracks.length} queued · no direct audio exposed`;showMeta(t)}metaFrame.classList.remove('open')}
    function togglePlay(){if(!currentTrack&&tracks.length){playTrack(0);return}if(audio.paused)audio.play().catch(()=>{});else audio.pause()}
    function prevTrack(){if(!tracks.length)return;playTrack((currentIndex-1+tracks.length)%tracks.length)}
    function nextTrack(){if(!tracks.length)return;playTrack((currentIndex+1)%tracks.length)}
    function showMeta(t){currentTrack=t;seeMoreBtn.disabled=false;copyNotice.textContent='';const metaText=metadataText(t);metaFrame.innerHTML=`<div class="meta-head"><h2>${esc(t.title)}</h2><button class="pill alt" id="copyMetaBtn" type="button">Copy Metadata</button></div><div class="meta-grid"><div class="meta-box"><div class="meta-k">Creator</div><div class="meta-v">${esc(t.creator)}</div></div><div class="meta-box"><div class="meta-k">Date</div><div class="meta-v">${esc(t.date||'n.d.')}</div></div><div class="meta-box"><div class="meta-k">Collection</div><div class="meta-v">${esc(t.collection||'LOC')}</div></div><div class="meta-box"><div class="meta-k">Status</div><div class="meta-v">${esc(t.status)}</div></div><div class="meta-box"><div class="meta-k">LOC URL</div><div class="meta-v">${esc(t.url||'No URL supplied')}</div></div><div class="meta-box"><div class="meta-k">Subjects</div><div class="meta-v">${esc(t.subject||'No subjects supplied')}</div></div><div class="meta-box meta-desc"><div class="meta-k">Description</div><div class="meta-v">${esc(t.description)}</div></div></div>`;metaFrame.classList.add('open');$('copyMetaBtn').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(metaText);copyNotice.textContent='metadata copied';}catch(e){copyNotice.textContent='copy failed';}});}
    function metadataText(t){return `Title: ${t.title}\nCreator: ${t.creator}\nDate: ${t.date||'n.d.'}\nCollection: ${t.collection||'LOC'}\nStatus: ${t.status}\nSubjects: ${t.subject||''}\nLOC URL: ${t.url||''}\nDescription: ${t.description||''}`}
    function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
    function escAttr(s){return esc(s).replace(/'/g,'&#39;')}
    init();
  </script>

<script id="loc-player-hotfix">
(function(){
  function $(id){ return document.getElementById(id); }

  document.addEventListener("error", function(e){
    if(e.target && e.target.tagName === "IMG" && e.target.closest("#cover")){
      $("cover").textContent = "LOC";
    }
  }, true);

  function scanAudio(value, out){
    if(!value) return;
    if(typeof value === "string"){
      if(/^https?:\/\//i.test(value) && /\.(mp3|m4a|wav|ogg|aac)(\?|$)/i.test(value)){
        out.push(value);
      }
      return;
    }
    if(Array.isArray(value)){ value.forEach(v => scanAudio(v, out)); return; }
    if(typeof value === "object"){ Object.values(value).forEach(v => scanAudio(v, out)); }
  }

  async function findDeepAudio(track){
    if(track.audio) return track.audio;
    if(!track.url) return "";
    try{
      const url = track.url.includes("?")
        ? track.url + "&fo=json"
        : track.url.replace(/\/?$/, "/") + "?fo=json";
      const res = await fetch(url);
      if(!res.ok) return "";
      const data = await res.json();
      const found = [];
      scanAudio(data, found);
      const audioUrl = found.find(u => /\.mp3(\?|$)/i.test(u)) || found[0] || "";
      if(audioUrl){
        track.audio = audioUrl;
        track.status = "Playable direct LOC audio";
      }
      return audioUrl;
    }catch(e){
      return "";
    }
  }

  const oldShowMeta = showMeta;
  showMeta = function(t){
    oldShowMeta(t);
    const frame = $("metaFrame");
    if(frame) frame.classList.add("open");
  };

  playTrack = async function(i){
    const t = tracks[i];
    if(!t) return;

    currentIndex = i;
    currentTrack = t;

    document.querySelectorAll(".row").forEach(row => {
      row.classList.toggle("selected", Number(row.dataset.index) === i);
    });

    $("nowTitle").textContent = t.title || "Untitled";
    $("nowCreator").textContent = t.creator || "Unknown creator";
    $("seeMoreBtn").disabled = false;
    $("copyNotice").textContent = "";

    const cover = $("cover");
    if(t.thumb){
      cover.innerHTML = '<img alt="" src="' + String(t.thumb).replace(/"/g, "&quot;") + '">';
      const img = cover.querySelector("img");
      if(img) img.onerror = function(){ cover.textContent = "LOC"; };
    }else{
      cover.textContent = "LOC";
    }

    const row = document.querySelector('.row[data-index="' + i + '"]');
    const btn = row ? row.querySelector(".playbtn") : null;
    if(btn) btn.textContent = "…";

    $("playerStatus").textContent = tracks.length + " queued · checking LOC audio";
    const audioUrl = await findDeepAudio(t);

    if(btn) btn.textContent = "▶";

    if(audioUrl){
      audio.src = audioUrl;
      audio.load();
      audio.play().catch(function(){
        $("mainPlayBtn").textContent = "▶";
        $("playerStatus").textContent = tracks.length + " queued · press play";
      });
      $("playerStatus").textContent = tracks.length + " queued · playing direct LOC audio";
    }else{
      audio.pause();
      audio.removeAttribute("src");
      audio.load();
      $("mainPlayBtn").textContent = "▶";
      t.status = "No direct browser-playable audio found. Metadata is available.";
      $("playerStatus").textContent = tracks.length + " queued · no direct audio exposed";
      showMeta(t);
    }
  };

  audio.addEventListener("error", function(){
    $("mainPlayBtn").textContent = "▶";
    if(currentTrack){
      currentTrack.status = "Audio could not load in browser. Metadata is available.";
      $("playerStatus").textContent = tracks.length + " queued · audio failed";
      showMeta(currentTrack);
    }
  });

  audio.addEventListener("ended", function(){
    if(tracks.length) playTrack((currentIndex + 1) % tracks.length);
  });
})();
</script>

</body>
</html>
